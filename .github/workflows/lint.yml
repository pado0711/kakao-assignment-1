name: Lint Check

on:
  pull_request:
    branches: [ "dev" ] # 본인의 메인 브랜치명으로 변경하세요.

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 💡 중요: 코드에서 정적 분석 수치를 검사합니다.
      # 규칙에 걸린 내용(복잡도 초과 등)이 있으면 PR의 'Files changed' 탭에 직접 경고 주석이 달립니다.
      - name: Run ESLint
        run: npm run lint